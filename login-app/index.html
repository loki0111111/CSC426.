<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 32px;
      width: 360px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h2 {
      font-size: 22px;
      margin-bottom: 24px;
      color: #222;
      text-align: center;
    }

    label {
      display: block;
      font-size: 14px;
      color: #444;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #2255cc; }
    input.error-field { border-color: #cc2222; }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      flex: 1;
      padding: 11px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
    }

    button[type="submit"] {
      background: #222;
      color: #fff;
      border-color: #222;
    }

    button[type="submit"]:hover { background: #444; }

    button[type="reset"] {
      background: #fff;
      color: #444;
    }

    button[type="reset"]:hover { background: #f5f5f5; }

    .message {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 14px;
      display: none;
      text-align: center;
    }

    .message.success {
      background: #f0fff4;
      border: 1px solid #4caf50;
      color: #2e7d32;
      display: block;
    }

    .message.error {
      background: #fff0f0;
      border: 1px solid #cc2222;
      color: #cc2222;
      display: block;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Login</h2>

  <form id="loginForm" onsubmit="handleLogin(event)" onreset="handleReset()">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />

    <div class="btn-row">
      <button type="submit">Login</button>
      <button type="reset">Reset</button>
    </div>
  </form>

  <div class="message" id="message"></div>

  <p class="hint">Demo: username: <strong>admin</strong> &nbsp;|&nbsp; password: <strong>1234</strong></p>
</div>

<script>
  const VALID_USERNAME = 'admin';
  const VALID_PASSWORD = '1234';

  function handleLogin(e) {
    e.preventDefault();

    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const msgEl = document.getElementById('message');

    const username = usernameEl.value.trim();
    const password = passwordEl.value.trim();

    // Clear previous state
    usernameEl.classList.remove('error-field');
    passwordEl.classList.remove('error-field');
    msgEl.className = 'message';
    msgEl.textContent = '';

    // Validation
    if (!username && !password) {
      usernameEl.classList.add('error-field');
      passwordEl.classList.add('error-field');
      showMessage('Username and password are required.', 'error');
      return;
    }
    if (!username) {
      usernameEl.classList.add('error-field');
      showMessage('Username is required.', 'error');
      return;
    }
    if (!password) {
      passwordEl.classList.add('error-field');
      showMessage('Password is required.', 'error');
      return;
    }

    // Auth check
    if (username === VALID_USERNAME && password === VALID_PASSWORD) {
      showMessage('Login successful! Welcome, ' + username + '.', 'success');
    } else {
      usernameEl.classList.add('error-field');
      passwordEl.classList.add('error-field');
      showMessage('Invalid username or password.', 'error');
    }
  }

  function handleReset() {
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const msgEl = document.getElementById('message');
    usernameEl.classList.remove('error-field');
    passwordEl.classList.remove('error-field');
    msgEl.className = 'message';
    msgEl.textContent = '';
  }

  function showMessage(text, type) {
    const msgEl = document.getElementById('message');
    msgEl.textContent = text;
    msgEl.className = 'message ' + type;
  }
</script>
</body>
</html>
